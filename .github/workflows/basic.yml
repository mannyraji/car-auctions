name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Detect project files
        id: project-files
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "No package.json found; skipping Node.js setup, install, test, lint, and formatting steps."
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
          fi

          if find . -maxdepth 2 \( -name 'tsconfig.json' -o -name 'tsconfig.*.json' \) | grep -q .; then
            echo "has_tsconfig=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tsconfig=false" >> "$GITHUB_OUTPUT"
          fi

          if find . -maxdepth 2 \( -name 'eslint.config.js' -o -name 'eslint.config.cjs' -o -name 'eslint.config.mjs' -o -name '.eslintrc' -o -name '.eslintrc.js' -o -name '.eslintrc.cjs' -o -name '.eslintrc.json' -o -name '.eslintrc.yaml' -o -name '.eslintrc.yml' \) | grep -q .; then
            echo "has_eslint_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_eslint_config=false" >> "$GITHUB_OUTPUT"
          fi

          if find . -maxdepth 2 \( -name '.prettierrc' -o -name '.prettierrc.json' -o -name '.prettierrc.js' -o -name '.prettierrc.cjs' -o -name '.prettierrc.mjs' -o -name '.prettierrc.yaml' -o -name '.prettierrc.yml' -o -name 'prettier.config.js' -o -name 'prettier.config.cjs' -o -name 'prettier.config.mjs' \) | grep -q .; then
            echo "has_prettier_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prettier_config=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.project-files.outputs.has_package_json == 'true'
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        if: steps.project-files.outputs.has_package_json == 'true'
        run: npm ci
      - name: Build TypeScript
        if: steps.project-files.outputs.has_package_json == 'true' && steps.project-files.outputs.has_tsconfig == 'true'
        run: npx tsc --build
      - name: Run tests
        if: steps.project-files.outputs.has_package_json == 'true'
        run: npm run test --workspaces --if-present -- --coverage
      - name: Lint
        if: steps.project-files.outputs.has_package_json == 'true' && steps.project-files.outputs.has_eslint_config == 'true'
        run: npx eslint .
      - name: Check formatting
        if: steps.project-files.outputs.has_package_json == 'true' && steps.project-files.outputs.has_prettier_config == 'true'
        run: npx prettier --check .
