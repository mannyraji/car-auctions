name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Detect root npm project
        id: npm-project
        shell: bash
        run: |
          if [[ -f package.json && ( -f package-lock.json || -f npm-shrinkwrap.json ) ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Node.js checks because no root package.json and npm lockfile were found."
          fi

      - uses: actions/setup-node@v4
        if: steps.npm-project.outputs.present == 'true'
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - if: steps.npm-project.outputs.present == 'true'
        run: npm ci

      - if: steps.npm-project.outputs.present == 'true'
        run: npx tsc --build

      - if: steps.npm-project.outputs.present == 'true'
        run: npm run test --workspaces --if-present -- --coverage

      - if: steps.npm-project.outputs.present == 'true'
        run: npx eslint .

      - if: steps.npm-project.outputs.present == 'true'
        run: npx prettier --check .
