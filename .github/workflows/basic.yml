name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - packages/shared/**
      - .github/workflows/basic.yml
      - package.json
      - package-lock.json
      - tsconfig.base.json
  push:
    branches: [main]
    paths:
      - packages/shared/**
      - .github/workflows/basic.yml
      - package.json
      - package-lock.json
      - tsconfig.base.json
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shared-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/shared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build
        run: npm run build --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm run test --if-present
