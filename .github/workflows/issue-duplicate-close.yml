name: Issue Duplicate Close

concurrency:
  group: issue-duplicate-close-${{ github.event.issue.number }}
  cancel-in-progress: false

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  close-duplicate:
    if: github.event.label.name == 'duplicate:confirmed'
    runs-on: ubuntu-latest
    steps:
      - name: Close confirmed duplicate issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const issue = context.payload.issue;

            // Skip if already closed
            if (issue.state === "closed") {
              console.log(`Issue #${issue_number} is already closed.`);
              return;
            }

            const marker = "<!-- duplicate-close-notice -->";

            // Check for an existing marker comment to stay idempotent
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const alreadyPosted = comments.some(
              (c) =>
                (c.user?.type === "Bot" || c.user?.login === "github-actions[bot]") &&
                (c.body || "").includes(marker)
            );

            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  marker,
                  "This issue has been marked as a confirmed duplicate and is being closed.",
                  "",
                  "If you believe this was marked incorrectly, please re-open and remove the `duplicate:confirmed` label.",
                ].join("\n"),
              });
            }

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              state: "closed",
              state_reason: "not_planned",
            });

            console.log(`Closed issue #${issue_number} as duplicate.`);
